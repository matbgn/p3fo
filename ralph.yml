# VSDD (Verified Spec-Driven Development) Preset
#
# The Fusion: VDD × TDD × SDD for AI-Native Engineering
#
# Pipeline: Planning → Spec Crystallization → Test-First Implementation → Adversarial Refinement
#           → Feedback Integration → Formal Hardening → Commit → Convergence
#
# Roles:
#   - The Architect (Human): Strategic vision, acceptance authority
#   - The Planner (AI): Input detection and context bootstrapping
#   - The Builder (AI): Spec authorship, test generation, implementation
#   - The Adversary (AI, fresh context): Hyper-critical reviewer
#   - The Formalizer (AI): Verification plan execution
#   - The Convergence Checker (AI): Ensures all dimensions converge
#   - The Committer (AI): Conventional commit creation
#
# Usage:
#   # Write PROMPT.md with your task
#   ralph run
#
#   # Or from PDD output directory:
#   ralph run --prompt "./specs/my-feature"
#
#   # Or from a single code task:
#   ralph run --prompt ".ralph/tasks/my-task.code-task.md"

event_loop:
  prompt_file: "PROMPT.md"
  starting_event: "build.start"   # Planner publishes this after coordination
  max_iterations: 150            # Generous for full VSDD pipeline
  max_runtime_seconds: 28800     # 8 hours max for formal verification phases
  checkpoint_interval: 5

cli:
  backend: "opencode"
  args:
    - "--model"
    - "ollama-cloud/glm-5"  # Change to your preferred model
  prompt_mode: "arg"

core:
  scratchpad: ".ralph/agent/scratchpad.md"
  specs_dir: "./specs/"
  decisions_file: ".ralph/agent/decisions.md"
  logs_dir: ".ralph/logs/"
  guardrails:
    - "IMPORTANT: Fresh context each iteration — save learnings to memories for next time"
    - "Spec Supremacy: The spec is the highest authority below the human developer. Tests serve the spec. Code serves the tests."
    - "Verification-First Architecture: Pure core, effectful shell. If you can't verify it, you architected it wrong."
    - "Red Before Green: No implementation code until a failing test demands it."
    - "Anti-Slop Bias: The first 'correct' version is assumed to contain hidden debt. Trust is earned through adversarial survival."
    - "Forced Negativity: Adversarial pressure bypasses politeness filters. The Adversary doesn't care about feelings — it cares about invariants."
    - "Four-Dimensional Convergence: Done only when specs, tests, implementation, AND formal proofs survive adversarial review."
    - "Verification is mandatory — justfile 'test' recipe must pass"
    - "YAGNI ruthlessly — no speculative features"
    - "KISS always — simplest solution that works"
    - "Fresh context each iteration - save learnings to memories for next time"
    - "Don't assume 'not implemented' - search first"
    - "Verification is mandatory - tests/typecheck/lint/audit must pass"
    - "Confidence protocol: score decisions 0-100. >80 proceed autonomously; 50-80 proceed + document in .ralph/agent/decisions.md; <50 choose safe default + document."

skills:
  enabled: true
  dirs:
    - ".agent/skills"

RObot:
  enabled: true                    # Enable human-in-the-loop (default: false)
  timeout_seconds: 10800           # How long to block waiting for a response
  checkin_interval_seconds: 900    # Periodic status updates (optional)

# Optional features
features:
  parallel: true                        # Allow worktree loops when primary lock is held
  auto_merge: false                     # Auto-merge worktree loops on completion
